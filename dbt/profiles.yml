ecommerce_analytics:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('RAW_DATASET_ID') }}"
      location: "{{ env_var('GCP_REGION') }}"
      threads: 4
      job_execution_timeout_seconds: 300
      job_retries: 1
    ci:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('RAW_DATASET_ID') }}"
      location: "{{ env_var('GCP_REGION') }}"
      threads: 4
      job_execution_timeout_seconds: 300
      job_retries: 1
